<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!--
    Menu-bar template image. Pure-black artwork on transparent bg;
    macOS auto-inverts it for dark mode when setTemplateImage(true).

    Sized down vs the original (r=7 instead of r=8) so the orbit fits
    inside the ~14px effective content area macOS expects for a
    16-px menubar icon, leaving 1-pixel padding all around. The
    earlier r=8 version went edge-to-edge and dragged its 7 o'clock
    dot below the menubar baseline.

    7 o'clock dot: (11 + 7·cos120°, 11 + 7·sin120°) ≈ (7.5, 17.06).
    Bbox y ∈ [4, 18.5], geometric center y ≈ 11.25 — within 0.25
    viewBox units of viewBox center, so we don't need an offset.
  -->
  <g fill="#000">
    <circle cx="11" cy="11" r="7" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="7.5" cy="17.06" r="1.7"/>
  </g>
</svg>
