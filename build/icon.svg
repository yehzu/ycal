<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6efe2"/>
      <stop offset="1" stop-color="#ece4d3"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0.05 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Rounded paper card -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#paper)"/>
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="transparent" filter="url(#grain)"/>
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180"
        fill="none" stroke="#1a1814" stroke-opacity="0.55" stroke-width="3"/>

  <!-- Top hairline rule (almanac/newspaper feel) -->
  <line x1="160" y1="240" x2="864" y2="240" stroke="#1a1814" stroke-width="3"/>
  <line x1="160" y1="252" x2="864" y2="252" stroke="#1a1814" stroke-width="1"/>

  <!-- Mast head: tiny serif eyebrow -->
  <text x="512" y="210" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="500" font-size="58"
        fill="#1a1814" letter-spacing="6">yCal</text>

  <!-- Big italic display ordinal "26" -->
  <text x="512" y="640" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="700" font-size="440"
        fill="#1a1814">26</text>

  <!-- Bottom hairline rule -->
  <line x1="160" y1="780" x2="864" y2="780" stroke="#1a1814" stroke-width="1"/>
  <line x1="160" y1="792" x2="864" y2="792" stroke="#1a1814" stroke-width="3"/>

  <!-- Day-of-week below -->
  <text x="512" y="868" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="600" font-size="46"
        fill="#1a1814" letter-spacing="14">SUNDAY</text>
</svg>
