<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8eb"/>
      <stop offset="0.7" stop-color="#f4ead2"/>
      <stop offset="1" stop-color="#ecdfbe"/>
    </linearGradient>
    <radialGradient id="hl" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Apple icon-grid: 824x824 squircle inside 1024 canvas (~80%) -->
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="184" ry="184"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" fill="url(#hl)"/>

    <!-- Italic Y in tomato — proportional to the inner squircle -->
    <text x="512" y="640" text-anchor="middle"
          font-family="'Playfair Display','Times New Roman',Georgia,serif"
          font-style="italic" font-weight="800" font-size="400"
          fill="#c33824">Y</text>

    <!-- Hairline editorial rule -->
    <line x1="424" y1="780" x2="600" y2="780" stroke="#9b2a18" stroke-width="3"/>
  </g>
</svg>
