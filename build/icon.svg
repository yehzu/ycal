<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8eb"/>
      <stop offset="0.7" stop-color="#f4ead2"/>
      <stop offset="1" stop-color="#ecdfbe"/>
    </linearGradient>
    <radialGradient id="hl" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="236" ry="236"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#hl)"/>

    <!-- Italic Y in tomato; baseline at y=720 so cap-top ~ 220 -->
    <text x="512" y="720" text-anchor="middle"
          font-family="'Playfair Display','Times New Roman',Georgia,serif"
          font-style="italic" font-weight="800" font-size="720"
          fill="#c33824">Y</text>

    <!-- Hairline editorial rule -->
    <line x1="374" y1="870" x2="650" y2="870" stroke="#9b2a18" stroke-width="5"/>
  </g>
</svg>
